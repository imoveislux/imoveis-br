<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Imóveis & Investimentos Imobiliários</title>

<link rel="apple-touch-icon" href="logo.png">
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">

<meta name="mobile-web-app-capable" content="yes">

<style>

/* CONFIGURAÇÃO DA PÁGINA */

html, body {

margin:0;
padding:0;
height:100%;

/* AGORA A PÁGINA PODE ROLAR */

overflow-y:auto;

background-color:#0B1218;

}

/* ESPAÇO EXTRA PARA O CURATIVO NÃO COBRIR BOTÕES */

body{

padding-bottom:120px;

}

/* CONTAINER PRINCIPAL */

.app-container{

width:100%;
height:100%;
position:relative;

background:#0B1218;

}

/* APP DO BASE44 */

iframe{

width:100%;

/* DIMINUÍMOS A ALTURA PARA NÃO FICAR ATRÁS DO CURATIVO */

height:calc(100vh - 80px);

border:none;

}

/* SUA LOGO */

.minha-logo{

position:fixed;

top:15px;
left:15px;

width:50px;

height:auto;

z-index:10000;

pointer-events:none;

}

/* CURATIVO PARA COBRIR MARCA */

.curativo{

position:fixed;

bottom:0;
left:0;

/* FUNCIONA EM QUALQUER TELA */

width:100%;

height:80px;

background:#0B1218;

z-index:9999;

pointer-events:none;

}

</style>

</head>

<body>

<div class="app-container">

<img src="logo.png" class="minha-logo">

<div class="curativo"></div>

<iframe src="https://imoveis-investimentos-imoveis-d09a2daa.base44.app"></iframe>

</div>

</body>

</html>
