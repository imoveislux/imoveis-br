<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Imóveis & Investimentos Imobiliários</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

/* estrutura */

html,body{
margin:0;
padding:0;
height:100%;
background:#0B1218;
overflow:hidden;
}

/* container */

.app-container{
width:100%;
height:100vh;
position:relative;
}

/* app */

iframe{
width:100%;
height:100%;
border:none;
display:block;
}

/* logo superior */

.minha-logo{
position:fixed;
top:15px;
left:15px;
width:50px;
z-index:10000;
pointer-events:none;
}

/* CURATIVO */

.curativo{

position:fixed;

bottom:0;
right:0;

width:260px;
height:90px;

background:#0B1218;

border-top-left-radius:30px;

z-index:9999;

display:flex;
align-items:center;
justify-content:center;

pointer-events:none;

}

/* LOGO DENTRO DO CURATIVO */

.logo-curativo{

width:40px;

}

/* MOBILE */

@media (max-width:768px){

.curativo{
width:180px;
height:70px;
}

.logo-curativo{
width:30px;
}

}

</style>

</head>

<body>

<div class="app-container">

<img src="logo.png" class="minha-logo">

<iframe src="https://imoveis-investimentos-imoveis-d09a2daa.base44.app"></iframe>

<div class="curativo">

<img src="logo.png" class="logo-curativo">

</div>

</div>

</body>

</html>
