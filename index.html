<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Imóveis & Investimentos Imobiliários</title>

<link rel="apple-touch-icon" href="logo.png">
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">

<meta name="mobile-web-app-capable" content="yes">

<style>

/* estrutura geral */

html,body{
margin:0;
padding:0;
height:100%;
background:#0B1218;
overflow-x:hidden;
}

/* container */

.app-container{
position:relative;
width:100%;
}

/* iframe */

iframe{
width:100%;
border:none;
display:block;
}

/* logo */

.minha-logo{

position:fixed;

top:15px;
left:15px;

width:50px;

z-index:10000;

pointer-events:none;

}

/* curativo */

.curativo{

position:absolute;

bottom:0;
left:0;

width:100%;
height:140px;

background:#0B1218;

z-index:9999;

pointer-events:none;

}

</style>

</head>

<body>

<div class="app-container">

<img src="logo.png" class="minha-logo">

<iframe id="appframe"
src="https://imoveis-investimentos-imoveis-d09a2daa.base44.app">
</iframe>

<div class="curativo"></div>

</div>

<script>

/* ajusta altura automaticamente */

function ajustarAltura(){

let alturaTela = window.innerHeight;

document.getElementById("appframe").style.height = alturaTela + "px";

}

/* executa ao carregar */

window.addEventListener("load", ajustarAltura);

/* executa ao redimensionar */

window.addEventListener("resize", ajustarAltura);

</script>

</body>

</html>
